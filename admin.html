<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR TV - Admin Approval Portal</title>
    <style>
        :root { --primary-color: #2c3e50; --accent-color: #c0392b; --bg-color: #f4f6f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; color: var(--primary-color); text-align: center; }
        .instruction { background: #e8f6f3; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; color: #16a085; text-align: center; }
        
        .approval-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .full-width { grid-column: span 2; }
        
        .btn-approve { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-approve:hover { background-color: #219150; }
        .btn-approve:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        #statusBox { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="container">
    <h2>AR TV - আন্ডারকাভার রিপোর্টার অ্যাপ্রুভাল সিস্টেম</h2>
    <div class="instruction">
        Formspree ড্যাশবোর্ড থেকে প্রার্থীর তথ্য দেখে এখানে ম্যানুয়ালি ইনপুট দিয়ে Approve করুন।
    </div>
    
    <form id="approvalForm" action="https://formspree.io/f/mykqbayr" method="POST">
        <div class="approval-form">
            <div class="form-group">
                <label>প্রার্থীর নাম (Applicant Name)</label>
                <input type="text" name="Approved_Applicant_Name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>কোড নেম (Code Name)</label>
                <input type="text" name="Assigned_Code_Name" required placeholder="Agent X">
            </div>
            <div class="form-group">
                <label>মোবাইল নম্বর (Mobile)</label>
                <input type="tel" name="Applicant_Mobile" required placeholder="017XXXXXXXX">
            </div>
            <div class="form-group">
                <label>এনআইডি নম্বর (Assign NID/ID)</label>
                <input type="text" name="NID_Assigned" required placeholder="1234567890">
            </div>
            <div class="form-group full-width">
                <label>অফিসিয়াল মন্তব্য (Official Remarks)</label>
                <input type="text" name="Admin_Remarks" value="Verification Successful - Approved for Duty">
            </div>
            
            <input type="hidden" name="_subject" value="New Applicant Approved - AR TV">
            
            <button type="submit" id="submitBtn" class="btn-approve full-width">CONFIRM & RECORD APPROVAL</button>
        </div>
    </form>

    <div id="statusBox"></div>
</div>

<script>
    const form = document.getElementById('approvalForm');
    const btn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        btn.disabled = true;
        btn.innerText = 'Processing Approval...';
        statusBox.style.display = 'none';

        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                statusBox.className = 'success';
                statusBox.innerHTML = '✅ প্রার্থীর তথ্য সফলভাবে Approve হয়েছে এবং রেকর্ড পাঠানো হয়েছে।';
                statusBox.style.display = 'block';
                form.reset();
            } else {
                statusBox.className = 'error';
                statusBox.innerHTML = '❌ কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।';
                statusBox.style.display = 'block';
            }
        })
        .catch(error => {
            statusBox.className = 'error';
            statusBox.innerHTML = '❌ নেটওয়ার্ক এরর।';
            statusBox.style.display = 'block';
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = 'CONFIRM & RECORD APPROVAL';
        });
    });
</script>

</body>
</html>
