<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>AR TV - Admin Approval</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e293b; color: white; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #0f172a; padding: 30px; border-radius: 10px; border: 1px solid #334155; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #334155; background: #1e293b; color: white; }
        .btn-approve { background: #22c55e; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; font-weight: bold; }
        .logout { color: #94a3b8; text-decoration: none; display: block; text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align: center; color: #e11d48;">ADMIN CONTROL</h2>
    <form action="https://formspree.io/f/mykqbayr" method="POST">
        <label>প্রার্থীর নাম</label>
        <input type="text" name="Approved_Name" required>
        
        <label>মোবাইল নম্বর</label>
        <input type="tel" name="Mobile" required>

        <label>অ্যাসাইন করা আইডি</label>
        <input type="text" name="Assigned_ID" value="ARTV-" required id="genId">
        
        <label>সিদ্ধান্ত</label>
        <select name="Status">
            <option value="Approved">Approve</option>
            <option value="Review">Review</option>
        </select>

        <button type="submit" class="btn-approve">CONFIRM APPROVAL</button>
    </form>
    <a href="login.html" class="logout">Logout</a>
</div>

<script>
    // অটো আইডি জেনারেশন
    document.getElementById('genId').value = "ARTV-" + Math.floor(1000 + Math.random() * 9000);
</script>

</body>
</html>
