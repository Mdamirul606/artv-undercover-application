<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR TV - Admin Approval Portal</title>
    <style>
        :root { 
            --primary-color: #2c3e50; 
            --accent-color: #c0392b; 
            --bg-color: #f4f6f9; 
            --card-bg: #ffffff;
            --text-color: #333;
        }

        /* Dark Mode Colors */
        [data-theme="dark"] {
            --primary-color: #ecf0f1;
            --bg-color: #1a1a1a;
            --card-bg: #2d2d2d;
            --text-color: #e0e0e0;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); padding: 20px; color: var(--text-color); transition: 0.3s; }
        .container { max-width: 800px; margin: 0 auto; background: var(--card-bg); padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* Login Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-color); z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; color: white; }
        .login-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 10px; text-align: center; }
        .login-box input { padding: 10px; margin: 10px 0; border-radius: 5px; border: none; width: 200px; }
        
        h2 { border-bottom: 3px solid var(--accent-color); padding-bottom: 10px; color: var(--accent-color); text-align: center; }
        .instruction { background: #e8f6f3; padding: 10px; border-radius: 4px; font-size: 14px; margin-bottom: 20px; color: #16a085; text-align: center; }
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .theme-btn { cursor: pointer; padding: 5px 15px; border-radius: 20px; border: 1px solid #ccc; background: var(--card-bg); color: var(--text-color); }

        .approval-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: rgba(0,0,0,0.02); padding: 20px; border-radius: 8px; border: 1px solid #ddd; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: bold; margin-bottom: 5px; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: var(--card-bg); color: var(--text-color); }
        .full-width { grid-column: span 2; }
        
        .btn-approve { background-color: #27ae60; color: white; border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        .btn-approve:hover { background-color: #219150; transform: translateY(-2px); }
        .btn-approve:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        
        #statusBox { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; text-align: center; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* History Table */
        .history-section { margin-top: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: var(--primary-color); color: white; }

        @media print {
            body * { visibility: hidden; }
            #statusBox, #statusBox * { visibility: visible; }
            #statusBox { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

<!-- Simple Password Protection -->
<div id="loginOverlay">
    <div class="login-box">
        <h3>AR TV ADMIN ACCESS</h3>
        <input type="password" id="adminPass" placeholder="Enter Admin Password"> <br>
        <button onclick="checkLogin()" class="btn-approve" style="width: 100%;">Unlock Portal</button>
    </div>
</div>

<div class="container">
    <div class="top-bar">
        <button class="theme-btn" onclick="toggleTheme()">🌙 Switch Mode</button>
        <span id="liveClock"></span>
    </div>

    <h2>AR TV - আন্ডারকাভার রিপোর্টার অ্যাপ্রুভাল সিস্টেম</h2>
    <div class="instruction">
        Formspree ড্যাশবোর্ড থেকে প্রার্থীর তথ্য দেখে এখানে ম্যানুয়ালি ইনপুট দিয়ে Approve করুন।
    </div>
    
    <form id="approvalForm" action="https://formspree.io/f/mykqbayr" method="POST">
        <div class="approval-form">
            <div class="form-group">
                <label>প্রার্থীর নাম (Applicant Name)</label>
                <input type="text" name="Approved_Applicant_Name" id="appName" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>কোড নেম (Code Name)</label>
                <input type="text" name="Assigned_Code_Name" id="codeName" required placeholder="Agent X">
            </div>
            <div class="form-group">
                <label>মোবাইল নম্বর (Mobile)</label>
                <input type="tel" name="Applicant_Mobile" id="mobile" required placeholder="017XXXXXXXX" pattern="[0-9]{11}">
            </div>
            <div class="form-group">
                <label>এনআইডি নম্বর (Assign NID/ID)</label>
                <input type="text" name="NID_Assigned" id="nid" required placeholder="1234567890">
            </div>
            <div class="form-group">
                <label>অ্যাপ্রুভাল আইডি (Auto-Generated)</label>
                <input type="text" name="Approval_ID" id="approvalId" readonly style="background: #eee;">
            </div>
            <div class="form-group">
                <label>তারিখ (Approval Date)</label>
                <input type="text" name="Approval_Date" id="approvalDate" readonly style="background: #eee;">
            </div>
            <div class="form-group full-width">
                <label>অফিসিয়াল মন্তব্য (Official Remarks)</label>
                <input type="text" name="Admin_Remarks" value="Verification Successful - Approved for Duty">
            </div>
            
            <input type="hidden" name="_subject" id="dynamicSubject" value="New Applicant Approved - AR TV">
            
            <button type="submit" id="submitBtn" class="btn-approve full-width">CONFIRM & RECORD APPROVAL</button>
        </div>
    </form>

    <div id="statusBox"></div>

    <div class="history-section">
        <h3>সাম্প্রতিক অ্যাপ্রুভাল তালিকা (Recent Records)</h3>
        <table id="historyTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>নাম</th>
                    <th>কোড নেম</th>
                    <th>তারিখ</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                <!-- Data will appear here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // --- 1. Login System Logic ---
    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "admin@artv99") { // ডিফল্ট পাসওয়ার্ড: artv2024 (আপনি পরিবর্তন করতে পারেন)
            document.getElementById('loginOverlay').style.display = 'none';
        } else {
            alert("ভুল পাসওয়ার্ড! সঠিক পাসওয়ার্ড দিন।");
        }
    }

    // --- 2. Live Clock & Auto Data ---
    function updateDateTime() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleString();
        document.getElementById('approvalDate').value = now.toLocaleDateString() + " " + now.toLocaleTimeString();
        if(!document.getElementById('approvalId').value) {
            document.getElementById('approvalId').value = 'ARTV-' + Math.floor(1000 + Math.random() * 9000);
        }
    }
    setInterval(updateDateTime, 1000);

    // --- 3. Dark Mode Logic ---
    function toggleTheme() {
        const body = document.documentElement;
        if (body.getAttribute('data-theme') === 'dark') {
            body.setAttribute('data-theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
        }
    }

    // --- 4. Original Form Submission Logic (Enhanced) ---
    const form = document.getElementById('approvalForm');
    const btn = document.getElementById('submitBtn');
    const statusBox = document.getElementById('statusBox');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        
        // Dynamic Subject with Name
        document.getElementById('dynamicSubject').value = "Approval: " + document.getElementById('appName').value;

        btn.disabled = true;
        btn.innerText = 'Processing Approval...';
        statusBox.style.display = 'none';

        const formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: {
                'Accept': 'application/json'
            }
        })
        .then(response => {
            if (response.ok) {
                const appName = document.getElementById('appName').value;
                const cName = document.getElementById('codeName').value;
                const aId = document.getElementById('approvalId').value;
                const aDate = document.getElementById('approvalDate').value;

                // Success Message & Receipt
                statusBox.className = 'success';
                statusBox.innerHTML = `
                    <h3>✅ প্রার্থীর তথ্য সফলভাবে রেকর্ড হয়েছে।</h3>
                    <p>নাম: ${appName} | আইডি: ${aId}</p>
                    <button onclick="window.print()" style="padding:5px 10px; cursor:pointer;">প্রিন্ট কপি ডাউনলোড করুন</button>
                `;
                statusBox.style.display = 'block';

                // Add to Local History Table
                addToHistory(aId, appName, cName, aDate);
                
                form.reset();
                document.getElementById('approvalId').value = ''; // Reset for next ID
                updateDateTime();
            } else {
                statusBox.className = 'error';
                statusBox.innerHTML = '❌ কোনো সমস্যা হয়েছে। আবার চেষ্টা করুন।';
                statusBox.style.display = 'block';
            }
        })
        .catch(error => {
            statusBox.className = 'error';
            statusBox.innerHTML = '❌ নেটওয়ার্ক এরর।';
            statusBox.style.display = 'block';
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerText = 'CONFIRM & RECORD APPROVAL';
        });
    });

    // --- 5. History Logger ---
    function addToHistory(id, name, code, date) {
        const table = document.getElementById('historyBody');
        const row = `<tr>
            <td>${id}</td>
            <td>${name}</td>
            <td>${code}</td>
            <td>${date}</td>
        </tr>`;
        table.innerHTML = row + table.innerHTML;
    }
</script>

</body>
</html>
