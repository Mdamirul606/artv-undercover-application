<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR TV - Secure Login</title>
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #0f172a; font-family: sans-serif; }
        .login-box { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 300px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { color: #e11d48; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 12px; background: #e11d48; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>AR TV LOGIN</h2>
    <input type="password" id="passCode" placeholder="সিকিউরিটি কোড দিন">
    <button onclick="checkAccess()">প্রবেশ করুন</button>
</div>

<script>
    function checkAccess() {
        const pass = document.getElementById('passCode').value;
        if (pass === "admin@artv99") {
            window.location.href = "admin.html"; // অ্যাডমিন পেজে নিয়ে যাবে
        } else if (pass === "artv2024") {
            window.location.href = "index.html"; // ইউজার পেজে নিয়ে যাবে
        } else {
            alert("ভুল পাসওয়ার্ড!");
        }
    }
</script>

</body>
</html>
